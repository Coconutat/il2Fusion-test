name: Release APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Read version metadata
        id: version
        env:
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          VERSION_NAME="$(grep '^IL2FUSION_VERSION_NAME=' gradle.properties | cut -d'=' -f2)"
          VERSION_CODE="$(grep '^IL2FUSION_VERSION_CODE=' gradle.properties | cut -d'=' -f2)"
          if [ "$REF_TYPE" = "tag" ]; then
            TAG_NAME="$REF_NAME"
          else
            TAG_NAME="v$VERSION_NAME"
          fi
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "release_name=il2Fusion $VERSION_NAME" >> "$GITHUB_OUTPUT"
          # 移除了硬编码的 asset_name，改为后续动态获取

      - name: Build release APK
        run: ./gradlew :app:assembleRelease

      - name: Publish GitHub Release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.version.outputs.tag_name }}
          RELEASE_NAME: ${{ steps.version.outputs.release_name }}
          VERSION_NAME: ${{ steps.version.outputs.version_name }}
        run: |
          # 1. 创建或更新 GitHub Release
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release edit "$TAG_NAME" --draft=false --title "$RELEASE_NAME"
          else
            gh release create "$TAG_NAME" --title "$RELEASE_NAME" --generate-notes
          fi

          # 2. 遍历打包出来的所有 APK 文件并上传
          # 这将兼容 Gradle split ABI 生成的多个 APK (如 app-x86-release.apk, app-arm64-v8a-release.apk)
          find app/build/outputs/apk/release -name "*.apk" | while read -r apk_file; do
            base_name=$(basename "$apk_file")
            
            # 动态重命名：将前缀 'app-' 替换为 'il2Fusion-{VERSION}-'
            # 示例 1: app-x86_64-release.apk -> il2Fusion-1.0.0-x86_64-release.apk
            # 示例 2: app-release.apk -> il2Fusion-1.0.0-release.apk (如果是通用包)
            new_name=$(echo "$base_name" | sed "s/^app-/il2Fusion-${VERSION_NAME}-/")
            
            ASSET_PATH="$RUNNER_TEMP/$new_name"
            cp "$apk_file" "$ASSET_PATH"
            
            echo "Uploading $new_name..."
            gh release upload "$TAG_NAME" "$ASSET_PATH" --clobber
          done
